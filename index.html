<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas</title>
<!-- Core stylesheets, in cascade order:
       1. tokens.css  — design system variables (loaded first so everything else can use var(--…))
       2. base.css    — html/body reset, header, generic typography
       3. shell.css   — topbar, app-root, boot overlay
     The assembled workspace places these at css/ (a sibling of core/),
     mirroring the source layout in atlas-core/css/.
     Atlas-specific stylesheets are loaded dynamically per-atlas
     during boot — see the loadAtlasStylesheets() helper below. -->
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/shell.css" />
</head>
<body>

<header id="shell-header">
  <!-- 2026-05-19: atlas switcher promoted to top-left of the shell
       header (was inside #topbar). atlas_router populates this host
       at registration time; if only one atlas is registered the host
       stays empty (no switcher dropdown). The "ATLAS:" label is
       intentionally absent — the dropdown's current value already
       names the atlas. -->
  <div id="atlas-switcher-host"></div>
  <!-- Chromosome (and any other) scope pickers live at the top of the
       header per Quentin's request. The router renders pickers into
       this <nav id="scopebar"> at navigate time. -->
  <nav id="scopebar"></nav>
  <!-- Per-page parameters-sidebar toggle. Previously lived in the per-atlas
       topbar (#tabBar) as a large orange gear; promoted into the shell
       header so it's tone-matched with the other header controls. Click
       forwards to the active page's #sidebarToggleBtn (see shell_chrome.js). -->
  <button id="globalSettingsBtn" type="button"
          title="Toggle the parameters sidebar"
          aria-label="Toggle parameters sidebar">⚙</button>
  <span id="schemaBadge" style="display: none;"></span>
  <span id="jsScriptsBadge" title="Loaded JavaScript modules registered as window globals.">JS · 0 scripts</span>

  <!-- Flex spacer pushes the right-side cluster to the right edge -->
  <div style="flex: 1;"></div>

  <!-- BLUE folder — session / layout -->
  <div class="header-folder" data-color="blue" title="Session and layout controls">
    <button class="header-folder-btn" type="button">
      <span class="dot">●</span>&nbsp;session
      <span class="arrow">▾</span>
    </button>
    <div class="header-folder-panel" id="sessionPanel">
      <button class="folder-btn" data-cmd="save-session" title="Save session JSON">💾 save</button>
      <button class="folder-btn" data-cmd="load-session" title="Load session JSON">📂 load</button>
      <button class="folder-btn" data-cmd="layout-mode" title="Toggle layout (fixed / free / compact)">📐 fixed</button>
      <button class="folder-btn" data-cmd="reset-layout" title="Reset layout to defaults">↺ reset layout</button>
    </div>
  </div>

  <!-- GREEN folder — modes -->
  <div class="header-folder" data-color="green" title="Working modes">
    <button class="header-folder-btn" type="button">
      <span class="dot">●</span>&nbsp;mode
      <span class="arrow">▾</span>
    </button>
    <div class="header-folder-panel" id="modePanel">
      <button class="folder-btn" data-cmd="candidate-mode" title="Toggle candidate drafting mode">🏗 candidate mode</button>
      <button class="folder-btn" data-cmd="auto-fill" title="Auto-fill haplotype labels">🪄 auto-fill</button>
      <button class="folder-btn" data-cmd="ig-labels" title="Toggle I·g labels strip">I·g labels: on</button>
    </div>
  </div>

  <!-- YELLOW folder — data -->
  <div class="header-folder" data-color="yellow" title="Data tools">
    <button class="header-folder-btn" type="button">
      <span class="dot">●</span>&nbsp;data
      <span class="arrow">▾</span>
    </button>
    <div class="header-folder-panel" id="dataPanel">
      <button class="folder-btn" data-cmd="export-data" title="Download full atlas context as JSON">📥 export</button>
      <button class="folder-btn" data-cmd="open-matrix" title="Open candidate × candidate Cramér's V matrix">🔗 matrix</button>
      <button class="folder-btn" data-cmd="active-samples" title="Active samples subset">active: —</button>
    </div>
  </div>

  <!-- Direct layout-mode + reset-layout buttons (also in the session folder,
       surfaced here so the user can click them without opening the folder).
       Clicks forward to the page-owned #layoutModeBtn / #resetLayoutBtn via
       the same data-cmd relay that the session folder uses. -->
  <button id="headerLayoutModeBtn" class="header-direct-btn" type="button"
          data-cmd="layout-mode"
          title="Toggle layout — fixed / free / compact">📐 compact</button>
  <button id="headerResetLayoutBtn" class="header-direct-btn" type="button"
          data-cmd="reset-layout"
          title="Reset layout to defaults">↺ reset layout</button>

  <!-- Server status standalone button -->
  <button id="atlasServerStandaloneBtn" type="button" title="Atlas server status">
    <span id="atlasServerStandaloneDot"></span><span id="atlasServerStandaloneLabel">server</span>
  </button>

  <!-- The atlas switcher lives in the topbar (left of the tabs) — the
       user prefers that placement so pages render to its right on the
       same row. Don't render a duplicate switcher here. -->

  <!-- Theme toggle — cycles dark → light → academic -->
  <button id="themeToggleBtn" type="button" title="Cycle theme">☀ light</button>
</header>

<nav id="topbar"></nav>
<main id="app-root">
  <div id="boot">loading atlases…</div>
</main>

<script type="module">
// =====================================================================
// Atlas shell bootstrap.
//
// Order:
//   1. Build AtlasState + Registry singletons.
//   2. Discover installed atlases.
//   3. Register each atlas with the registry + state.
//   4. Attach prewarm scheduler.
//   5. Attach router (which renders topbar + handles initial hash).
//
// On any error, replace #boot with a clear error message and stop.
// =====================================================================

import { AtlasState }        from './core/atlas_state.js';
import { Registry }          from './core/registry_core.js';
import { PrewarmScheduler }  from './core/prewarm_scheduler.js';
import { AtlasRouter }       from './core/atlas_router.js';
import { discover }          from './core/atlas_discovery.js';
import { bootstrap }         from './core/atlas_api.js';
import { loadMasterConfig }  from './core/master_config.js';
import { attachShellChrome } from './core/shell_chrome.js';

(async () => {
  try {
    const SERVER_BASE_URL = window.ATLAS_SERVER_URL || 'http://localhost:5000';

    // Master config is OPTIONAL. When present, layers can use
    // `root: <name>` + `path_under_root: <template>` for portable paths.
    // When absent, layers use bare `path:` (atlas-relative). See
    // toolkit_registries/MASTER_CONFIG.md.
    const masterConfig = await loadMasterConfig({ baseUrl: '' }).catch(err => {
      console.error('master_config load failed:', err);
      return null;
    });

    const state = new AtlasState({ serverBaseUrl: SERVER_BASE_URL });
    // 2026-05-19: rehydrate persisted shared state (activeChrom, currentPage)
    // BEFORE seeding from master_config so a returning user's last selection
    // wins over the static config default. Per-atlas slots are also loaded
    // here, but atlas-specific persist keys aren't registered until the
    // atlas configs are loaded below — so this call only rehydrates `shared`
    // and stashes `_pendingCurrentPage` for the router's cold-boot fallback.
    try { state.loadPersisted(); } catch (e) { console.warn('loadPersisted:', e); }

    const registry = new Registry({
      atlasState: state,
      serverBaseUrl: SERVER_BASE_URL,
      masterConfig,
    });
    bootstrap({ registry, atlasState: state });

    // Seed activeSpecies from master_config so species_scoped roots
    // resolve at first fetch. Pages can override via the scopebar.
    if (masterConfig && Array.isArray(masterConfig.species)) {
      const active = masterConfig.species.find(s => s && s.active === true);
      const firstId = active ? active.id : masterConfig.species[0]?.id;
      if (firstId && !state.shared.activeSpecies) state.shared.activeSpecies = firstId;
    }
    // Seed activeChrom from master_config.atlas.active_chrom (if set).
    // Only seeds when nothing was rehydrated from localStorage — otherwise
    // the persisted chrom would be clobbered by the static default.
    if (masterConfig && masterConfig.atlas && masterConfig.atlas.active_chrom
        && !state.shared.activeChrom) {
      state.shared.activeChrom = masterConfig.atlas.active_chrom;
    }

    const manifests = await discover({ devMode: true });
    if (manifests.size === 0) {
      document.getElementById('boot').innerHTML =
        '<h2>No atlases installed</h2>' +
        '<p>Drop an atlas package folder into <code>atlases/</code> and reload.</p>' +
        '<p>See <code>README_PAIRING.md</code>.</p>';
      return;
    }

    // Register each atlas with state + registry. Per-atlas failures are
    // isolated: a malformed or incomplete atlas package (e.g. a new
    // scaffold missing one of its five registry JSONs) logs a console
    // error and is dropped from the manifests map, but the rest of the
    // shell still boots. This matters because scaffold atlases get
    // added often, and a missing registries/data/*.json file on any
    // single atlas used to kill the entire shell.
    const failedAtlases = [];
    for (const [atlas_id, manifest] of [...manifests]) {
      try {
        const configs = await loadAtlasConfigs(atlas_id, manifest);
        registry.register_atlas(atlas_id, configs);
        state.registerAtlasSlots(atlas_id, configs.slots.slots || {});
        // Load atlas-specific stylesheets if declared. Each atlas can
        // declare a `stylesheets` array in its manifest; paths are relative
        // to the workspace root (e.g. "atlases/inversion/css/widgets.css").
        // Per-page styles are not loaded here — they're loaded by the
        // router when the page mounts.
        loadAtlasStylesheets(manifest);
      } catch (err) {
        console.error(`Atlas '${atlas_id}' failed to load — dropping from shell:`, err);
        failedAtlases.push({ atlas_id, error: err.message || String(err) });
        manifests.delete(atlas_id);
      }
    }
    // Surface failures on a banner so dev knows an atlas was dropped
    // (otherwise the shell quietly works minus one atlas, which is
    // confusing). Banner is dismissable; doesn't block any UX.
    if (failedAtlases.length > 0) {
      _showFailedAtlasesBanner(failedAtlases);
    }
    if (manifests.size === 0) {
      document.getElementById('boot').innerHTML =
        '<h2>No atlases loaded</h2>' +
        '<p>Every installed atlas failed to load. See console for details.</p>';
      return;
    }

    // Wire prewarm scheduler
    const scheduler = new PrewarmScheduler({ atlasState: state, registry });
    scheduler.attach();

    // Wire router (this also renders the topbar)
    const router = new AtlasRouter({ atlasState: state, registry, manifests });
    router.attach();

    // Wire shell chrome (theme toggle + folder-button command relay).
    // After the router so the header DOM elements exist by the time we
    // bind listeners.
    attachShellChrome();

    document.getElementById('boot')?.remove();
  } catch (err) {
    console.error('Atlas boot failed:', err);
    const boot = document.getElementById('boot');
    if (boot) {
      boot.classList.add('error');
      boot.innerHTML = `<h2>Atlas failed to start</h2><pre>${err.stack || err.message}</pre>`;
    }
  }
})();

async function loadAtlasConfigs(atlas_id, manifest) {
  const reg = manifest.registries || {};
  const out = {};
  // 2026-05-19: was strict — any missing registry threw and dropped the
  // whole atlas from the shell. Symptom for the user: a single transient
  // assemble.sh race (e.g. the dev server caching a 404 from before a
  // registry was emitted) silently killed the entire meiosis atlas. Now
  // we substitute an empty-shell registry on missing/malformed files +
  // log a warning. The atlas still boots; pages that read from the
  // missing registry render their "no data" fallback instead of being
  // unreachable. Atlas-fatal errors (e.g. missing manifest.json) still
  // throw — those are handled upstream in discover().
  for (const [name, path] of Object.entries(reg)) {
    try {
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      out[name] = await resp.json();
    } catch (err) {
      console.warn(
        `atlas '${atlas_id}': missing/unreadable registry '${name}' at ${path} ` +
        `(${err.message}). Substituting empty shell so the atlas still boots; ` +
        `pages reading this registry will render their no-data fallback.`
      );
      // Each registry doc nests its content under a key matching its name
      // (e.g. layers.registry.json → { layers: {...} }). Provide that
      // shape so downstream `configs.<name>.<name>` reads stay safe.
      out[name] = { [name]: {} };
    }
  }
  return out;
}

/**
 * Surface a small dismissable banner naming each atlas that failed to
 * load. Without this the shell silently boots minus the broken atlas,
 * which is confusing — the user just sees a missing tab and can't tell
 * why. The banner gives them the file path or error to act on.
 */
function _showFailedAtlasesBanner(failures) {
  const wrap = document.createElement('div');
  wrap.id = 'failed-atlases-banner';
  wrap.style.cssText =
    'position:fixed;top:0;left:0;right:0;z-index:9999;' +
    'padding:8px 14px;background:rgba(232,90,60,0.12);' +
    'border-bottom:1px solid rgba(232,90,60,0.6);' +
    'color:var(--ink,#ddd);font:12px/1.5 var(--mono,monospace);' +
    'display:flex;align-items:flex-start;gap:12px;';
  const msg = failures.map(f => `<b>${f.atlas_id}</b>: ${f.error}`).join('<br>');
  wrap.innerHTML =
    `<div style="flex:1;">⚠ ${failures.length} atlas${failures.length === 1 ? '' : 'es'} failed to load (shell still booted without):` +
    `<br>${msg}</div>` +
    `<button type="button" style="background:transparent;border:1px solid currentColor;color:inherit;padding:2px 8px;cursor:pointer;border-radius:2px;">dismiss</button>`;
  wrap.querySelector('button').addEventListener('click', () => wrap.remove());
  document.body.appendChild(wrap);
}

/**
 * Inject <link rel="stylesheet"> tags for an atlas's declared stylesheets.
 * The atlas's manifest may include:
 *   "stylesheets": [
 *     "atlases/inversion/css/theme.css",
 *     "atlases/inversion/css/widgets.css"
 *   ]
 * These are atlas-wide styles that apply on every page of that atlas.
 * Per-page styles are loaded by the router when the page mounts (see
 * atlas_router.js — page entry can include a `stylesheet` field).
 *
 * If a stylesheet is already present in <head>, it's not re-added.
 */
function loadAtlasStylesheets(manifest) {
  const list = Array.isArray(manifest.stylesheets) ? manifest.stylesheets : [];
  for (const href of list) {
    if (document.querySelector(`link[rel="stylesheet"][href="${href}"]`)) continue;
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href;
    link.dataset.atlas = manifest.atlas_id;
    document.head.appendChild(link);
  }
}
</script>

</body>
</html>
