# =============================================================================
# atlas master_config.yaml  (site-local, WSL @ /mnt/e/)
# =============================================================================
# Active master_config for THIS machine. Loaded by core/master_config.js in
# preference to master_config.example.yaml.
#
# All read-only roots use ABSOLUTE /mnt/e/... paths pointing directly at the
# results_inversions / results_diversity / results_population / results_genome
# tree we just laid down. The unified server's static mount serves them
# because assemble.sh creates a $WORKSPACE/mnt/e -> /mnt/e symlink (the
# absolute-path mirror) — fetching /mnt/e/X resolves to that symlink.
#
# Cache lives outside the project tree at /mnt/e/atlas-cache.
# =============================================================================

atlas:
  workspace_root: "."
  active_atlas:   "inversion"
  # Use the bare chrom id ("LG28") here, matching the manifest's
  # scope_picker options and the {chrom} placeholder in layer templates.
  # The on-disk filename is species-prefixed (C_gar_LG28.atlas.json) —
  # the species prefix is baked into the layer's path_under_root, not
  # into active_chrom.
  active_chrom:   "LG28"

species:
  - id:     "gariepinus"
    config: "species/gariepinus.config.yaml"
    active: true

# -----------------------------------------------------------------------------
# ROOTS
# -----------------------------------------------------------------------------
# Absolute /mnt/e/ paths. species_scoped: false everywhere for now (single
# species cohort); when macrocephalus data lands, add per-species roots and
# flip species_scoped: true on the ones that need it.
# -----------------------------------------------------------------------------
roots:

  # ----- read-only inputs (Category 1) ---------------------------------------

  beagle:
    path: "/mnt/e/results_inversions/01_beagle"
    role: "intervals"
    species_scoped: false
    description: "main_qcpass.<CHR>.beagle.gz files. Input to popstats compute."

  cohort_dosage:
    path: "/mnt/e/results_inversions/02_dosage_sites"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome dosage tile store: <chrom>.sites.tsv.gz + <chrom>.dosage.tsv.gz. Read by GET /api/dosage/chunk for the streaming dosage heatmap."

  inversion_theta_pi_pestPG:
    path: "/mnt/e/results_inversions/03_theta_pi_pestPG"
    role: "intervals"
    species_scoped: false
    description: "win10000.step2000 pestPG subset consumed by STEP_TR_A/B (theta-pi local-PCA path). Sourced from results_diversity/03_theta_pi; copied here so the inversion pipeline reads only the scale it actually uses (per the STEP_TR_A/B README, the other 3 scales stay in diversity)."

  clair3_phased_ghsl:
    path: "/mnt/e/results_inversions/04_clair3_phased_GHSL"
    role: "intervals"
    species_scoped: false
    description: "Phased Clair3 VCFs feeding the GHSL inversion-discovery path."

  precomp_zblocks:
    path: "/mnt/e/results_inversions/local_PCA_MDS_z/09_atlas_json"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome atlas JSONs from the z-blocks local-PCA path. Auto-loaded by atlas pages. Bumped 2026-05-14 from 04_atlas_json to 09_atlas_json (new pipeline output dir). Files are written as C_gar_LG{NN}.atlas.json — the species prefix and .atlas infix are baked into the scrubber_main layer's path_under_root."

  precomp_thetapi:
    path: "/mnt/e/results_inversions/local_PCA_MDS_theta_pi/04_atlas_json"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome atlas JSONs from the theta-pi local-PCA path. Auto-loaded by atlas pages. Note: theta-pi files are laid out as 04_atlas_json/C_gar_LG{NN}/C_gar_LG{NN}_phase2_theta.json (per-chrom subfolder, distinct from the z-blocks flat layout). The /api/precomp_index endpoint handles both via depth-2 scan, so the scrubber_thetapi layer can stay auto_index: true."

  precomp_ghsl:
    path: "/mnt/e/results_inversions/local_PCA_MDS_GHSL/09_atlas_json"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome atlas JSONs from the GHSL local-PCA path. Auto-loaded by atlas pages. Bumped 2026-05-14 from 04_atlas_json to 09_atlas_json (new pipeline output dir)."

  per_chrom_zblocks:
    path: "/mnt/e/results_inversions/local_PCA_MDS_z/03_per_chrom"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome RDS / sim-mat / envelope outputs for the z-blocks local-PCA path."

  per_chrom_thetapi:
    path: "/mnt/e/results_inversions/local_PCA_MDS_theta_pi/03_per_chrom"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome outputs for the theta-pi local-PCA path."

  per_chrom_ghsl:
    path: "/mnt/e/results_inversions/local_PCA_MDS_GHSL/03_per_chrom"
    role: "intervals"
    species_scoped: false
    description: "Per-chromosome outputs for the GHSL local-PCA path."

  mds_zblocks:
    path: "/mnt/e/results_inversions/local_PCA_MDS_z/02_mds"
    role: "intervals"
    species_scoped: false
    description: "Genome-wide MDS rollup for the z-blocks path (windows_master.tsv.gz, candidate_regions.tsv.gz)."

  mds_thetapi:
    path: "/mnt/e/results_inversions/local_PCA_MDS_theta_pi/02_mds"
    role: "intervals"
    species_scoped: false
    description: "MDS rollup for the theta-pi path (may be empty by design)."

  mds_ghsl:
    path: "/mnt/e/results_inversions/local_PCA_MDS_GHSL/02_mds"
    role: "intervals"
    species_scoped: false
    description: "MDS rollup for the GHSL path."

  shared:
    path: "/mnt/e/_shared"
    role: "samples"
    species_scoped: false
    description: "Cohort-wide inputs the whole atlas reads (samples.ind, chrom_sizes.tsv, callable_regions.rf, samples_qcpass.txt, bamlist_qcpass.txt, etc.). Used by inversions, diversity, AND population."

  reference:
    path: "/mnt/e/_shared/reference"
    role: "intervals"
    species_scoped: false
    description: "Reference FASTA + index. Filenames declared in species/gariepinus.config.yaml. Top-level shared so all three result trees can read it."

  # ----- diversity, population, genome ---------------------------------------

  # Folder names mirror the producer repo at
  # /mnt/c/Users/quent/Desktop/catfish-diversity-analysis/Modules/.
  diversity_saf_per_sample:
    path: "/mnt/e/results_diversity/01_saf_per_sample"
    role: "samples"
    species_scoped: false
    description: "Per-sample ANGSD SAF outputs (Module 01_saf_per_sample). 226 samples."

  diversity_heterozygosity:
    path: "/mnt/e/results_diversity/02_heterozygosity"
    role: "samples"
    species_scoped: false
    description: "Heterozygosity bundle (Module 02_heterozygosity). Subfolders: 02_sfs/, 04_summary/ (genomewide_heterozygosity.tsv), 05_ancestry_heterozygosity/, 05_single_heterozygosity_boxplot/."

  diversity_theta_pi:
    path: "/mnt/e/results_diversity/03_theta_pi"
    role: "intervals"
    species_scoped: false
    description: "ANGSD -doThetas pestPG outputs (Module 03_theta_pi). 4 scales x 226 samples = 904 .pestPG files. Read by both diversity scans AND the inversion path-2 (theta-pi local-PCA) via the registry."

  diversity_roh:
    path: "/mnt/e/results_diversity/04_roh"
    role: "samples"
    species_scoped: false
    description: "ROH outputs (Module 04_roh) including F_ROH | H framework results."

  diversity_aggregated:
    path: "/mnt/e/results_diversity/05_aggregated"
    role: "samples"
    species_scoped: false
    description: "Cross-module rollups (Module 05_aggregated): genome-wide pi/theta tables, sample-level summaries."

  population_natora:
    path: "/mnt/e/results_population/01_natora_pruned"
    role: "samples"
    species_scoped: false
    description: "NAToRA-pruned unrelated subset (e.g. 81 samples)."

  population_ngsrelate:
    path: "/mnt/e/results_population/02_ngsrelate"
    role: "samples"
    species_scoped: false
    description: "Pairwise ngsRelate theta + relatedness summaries."

  population_ngsadmix:
    path: "/mnt/e/results_population/03_ngsadmix"
    role: "samples"
    species_scoped: false
    description: "NGSadmix K=2..20 sweeps (qopt + log-likelihood tables)."

  population_pcangsd:
    path: "/mnt/e/results_population/04_pcangsd"
    role: "samples"
    species_scoped: false
    description: "pcangsd PCA / kinship outputs."

  population_evaladmix:
    path: "/mnt/e/results_population/05_evaladmix"
    role: "samples"
    species_scoped: false
    description: "evalAdmix residuals."

  population_fpw:
    path: "/mnt/e/results_population/06_FPW"
    role: "samples"
    species_scoped: false
    description: "Founder waves (FPW) decomposition."

  genome_assembly:
    path: "/mnt/e/results_genome/01_assembly"
    role: "intervals"
    species_scoped: false
    description: "hifiasm / verkko outputs."

  genome_annotation:
    path: "/mnt/e/results_genome/02_annotation"
    role: "intervals"
    species_scoped: false
    description: "BRAKER, RepeatMasker, etc."

  genome_te_density:
    path: "/mnt/e/results_genome/03_TE_density"
    role: "intervals"
    species_scoped: false
    description: "EDTA outputs and TE density tracks."

  genome_synteny:
    path: "/mnt/e/results_genome/04_synteny"
    role: "intervals"
    species_scoped: false
    description: "wfmash + catfish-synteny-toolkit outputs."

  # ----- writable evidence roots (Category 1, browser-writable) --------------

  candidates:
    path: "/mnt/e/atlas-cache/candidates"
    role: "evidence"
    description: "Per-candidate folders. WRITABLE - browser analysis modules persist here. Held in atlas-cache so the source tree stays clean."

  arrangement_calls:
    path: "/mnt/e/atlas-cache/arrangement_calls"
    role: "evidence"
    description: "Per-candidate per-version arrangement call outputs. WRITABLE."

  comparative:
    path: "/mnt/e/atlas-cache/comparative"
    role: "intervals"
    description: "Cross-species synteny / breakpoint reuse / phylogeny derived in-session."

  review_sessions:
    path: "/mnt/e/atlas-cache/review/{active_atlas}/sessions"
    role: "evidence"
    description: "Per-session review state (manual overrides, candidate decisions). WRITABLE; allowlisted in the server's POST /file handler."

  # ----- working dir + cache (Categories 2 + 3) ------------------------------

  working_dir:
    path: "/mnt/e/atlas-cache/working_dir"
    role: "results"
    description: "Persistent working directory for browser-side analysis outputs not tied to a candidate version."

  cache:
    path: "/mnt/e/atlas-cache"
    role: "results"
    writable: true
    ephemeral: true
    description: "Working cache for server compute results, browser-side intermediate computations, plus the writable evidence roots above. Layout: server_results/{op_id}/{hash}.json + free-form. SAFE TO DELETE (the writable evidence roots also live here - back them up elsewhere if you care about review state)."
    excluded_from_tarballs: true

# -----------------------------------------------------------------------------
# SERVER  (atlas_server.py)
# -----------------------------------------------------------------------------
server:

  bind:
    host: "127.0.0.1"
    port: 8000

  cors_origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
    - "null"

  validation:
    min_group_n: 10

  popstats_cache:
    path: "/mnt/e/atlas-cache/popstats_engine_cache"
    max_bytes: 53687091200
    health_ttl_sec: 60

  dosage:
    max_region_bp: 50000000
    samples_file: null

# -----------------------------------------------------------------------------
# ENGINES — local compiled binaries (Windows / WSL).
# -----------------------------------------------------------------------------
engines:
  region_popstats: "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/region_popstats"
  hobs_windower:   "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/hobs_windower"
  angsd_patched:   "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/angsd_fixed_HWE"
  instant_q:       "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/instant_q"

# -----------------------------------------------------------------------------
# DEFAULTS
# -----------------------------------------------------------------------------
defaults:

  popstats:
    win_bp: 50000
    step_bp: 10000
    type: 2
    downsample: 1
    ncores: 4

  hobs:
    scales:
      - "5kb:5000:1000"
      - "10kb:10000:2000"
      - "50kb:50000:10000"
      - "100kb:100000:20000"
      - "250kb:250000:50000"
      - "500kb:500000:100000"
      - "1Mb:1000000:200000"

  angsd:
    threads: 2
    major_minor: 1
    min_maf: 0.05
    min_mapq: 20
    min_q: 20
    snp_pval: "1e-6"
    max_het_freq: 1.0
