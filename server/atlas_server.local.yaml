# =============================================================================
# atlas_server.local.yaml
# =============================================================================
# Local WSL config for atlas_server.
#
# Purpose:
# - Run live BEAGLE-based popstats locally from /mnt/e
# - Use local compiled binaries from /mnt/c/Users/quent/Desktop/bio_tools_quentin/bin
# - Skip BAM-heavy Hobs/HWE for now by pointing bam_dir to an empty folder
#
# Original scratch/LANTA paths are kept below as comments for reference.
# =============================================================================

# ---- Server bind ------------------------------------------------------------
# Use 8766 locally because 8765 may already be used by the atlas/static server.
bind:
  host: "127.0.0.1"
  # port: 8765
  port: 8766

# ---- Project anchors --------------------------------------------------------
# Original scratch base:
# base: "/scratch/lt200308-agbsci/Quentin_project_KEEP_2026-02-04"
# base: "/lustrefs/flash/scratch/lt200308-agbsci/Quentin_project_KEEP_2026-02-04"

# Local data base on E: — the new $SCRATCH-mirror tree
# (mkdir'd by setup, populated by setup_local_data.sh symlinks).
base: "/mnt/e"

# Original scratch reference paths:
# ref: "${base}/00-samples/fClaHyb_Gar_LG.fa"
# ref_fai: "${base}/00-samples/fClaHyb_Gar_LG.fa.fai"

# Local reference paths (symlinked into _shared/reference by setup_local_data.sh):
ref: "${base}/results_inversions/_shared/reference/fClaHyb_Gar_LG.fa"
ref_fai: "${base}/results_inversions/_shared/reference/fClaHyb_Gar_LG.fa.fai"

# ---- Engine binaries --------------------------------------------------------
# Local compiled binaries / symlinks.
# Each binary hash is mixed into cache keys.
engines:
  # Original scratch paths:
  # region_popstats: "${base}/unified_ancestry/engines/fst_dxy/region_popstats"
  # hobs_windower:   "${base}/unified_ancestry/engines/hobs_hwe/scripts/hobs_windower"
  # angsd_patched:   "${base}/angsd_fixed_HWE/angsd"
  # instant_q:       "${base}/unified_ancestry/src/instant_q"

  # Local compiled engine paths:
  region_popstats: "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/region_popstats"
  hobs_windower:   "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/hobs_windower"
  angsd_patched:   "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/angsd_fixed_HWE"
  instant_q:       "/mnt/c/Users/quent/Desktop/bio_tools_quentin/bin/instant_q"

# ---- Data inputs ------------------------------------------------------------
# BEAGLE_DIR — where main_qcpass.<CHR>.beagle.gz lives.
# Original scratch:
# beagle_dir: "${base}/inversion_localpca_v7/02_snps_beagle"

# Local BEAGLE directory (symlinks into 01-catfish_assembly_manuscript_CGA/02_snps_beagle):
beagle_dir: "${base}/results_inversions/01_beagle"

# Sample list, one ID per line, same order as BEAGLE columns.
# Original scratch:
# sample_list: "${base}/het_roh/01_inputs_check/samples.ind"

# Local sample list (symlinked into _shared/ by setup_local_data.sh):
sample_list: "${base}/results_inversions/_shared/samples.ind"

# Per-sample BAMs used by Hobs/HWE endpoint.
# We skip BAM-heavy Hobs/HWE locally for now, but keep this key defined
# so server startup does not fail if it validates config structure.
# Original scratch:
# bam_dir: "${base}/00-samples/bams"
# bam_suffix: "markdup.bam"

# Local dummy BAM directory:
bam_dir: "${base}/atlas-cache/empty_bams"
bam_suffix: "markdup.bam"

# Engine B ancestry cache.
# Original scratch:
# local_q_dir: "${base}/ancestry_cache"

# Local dummy ancestry cache for now:
local_q_dir: "${base}/atlas-cache/empty_ancestry_cache"

# ---- Dosage heatmap bridge --------------------------------------------------
# Per-chromosome dosage store consumed by GET /api/dosage/chunk:
#     <dosage_dir>/<chrom>.sites.tsv.gz   pos, ref, alt, miss, diag, site_id
#     <dosage_dir>/<chrom>.dosage.tsv.gz  n_sites x n_samples
# Symlinked into 04_dosage_by_chr by setup_local_data.sh.
dosage_dir: "${base}/results_inversions/02_dosage_sites"
dosage_max_region_bp: 50000000

# ---- Cache directory --------------------------------------------------------
# Original scratch:
# cache_dir: "${base}/popstats_server_cache"

# Local server-managed cache (engine outputs):
cache_dir: "${base}/atlas-cache/popstats_server_cache"
cache_max_bytes: 53687091200
cache_health_ttl_sec: 60

# ---- Server results cache (registry v2 persist contract) --------------------
# When a registry layer entry has persist: true, the resolve() pipeline
# writes the operation result via POST /file/_cache/server_results/<op>/<hash>.json,
# which the server rewrites to live under this directory (kept off the
# project tree).
server_results_cache_root: "${base}/atlas-cache/server_results"

# ---- Engine defaults --------------------------------------------------------
popstats_defaults:
  win_bp: 50000
  step_bp: 10000
  type: 2
  downsample: 1
  ncores: 4

hobs_defaults:
  scales:
    - "5kb:5000:1000"
    - "10kb:10000:2000"
    - "50kb:50000:10000"
    - "100kb:100000:20000"
    - "250kb:250000:50000"
    - "500kb:500000:100000"
    - "1Mb:1000000:200000"

angsd_defaults:
  threads: 2
  major_minor: 1
  min_maf: 0.05
  min_mapq: 20
  min_q: 20
  snp_pval: "1e-6"
  max_het_freq: 1.0

# ---- Validation -------------------------------------------------------------
min_group_n: 10

# ---- CORS -------------------------------------------------------------------
# Atlas's unified server (start.sh) defaults to port 8000. Include 8000 plus
# the legacy split-server ports (8765 / 8766) for back-compat.
cors_origins:
  - "http://localhost:8000"
  - "http://127.0.0.1:8000"
  - "http://localhost:8765"
  - "http://127.0.0.1:8765"
  - "http://localhost:8766"
  - "http://127.0.0.1:8766"
  - "null"
