# =============================================================================
# species.example.yaml — TWO species shown side-by-side
# =============================================================================
# Per-species config for a multi-species atlas. Copy ONE of the blocks below
# into its own file (e.g. gariepinus.config.yaml, macrocephalus.config.yaml)
# and reference from master_config.yaml under the `species:` array.
#
# Single-species atlases can keep one species block and ignore the rest.
# Multi-species atlases load all listed species; the registry templates
# {species_id} into species-scoped layer paths.
# =============================================================================


# -----------------------------------------------------------------------------
# Example 1 — C. gariepinus (the cohort active in the inversion atlas today)
# -----------------------------------------------------------------------------
# Save this block as `species/gariepinus.config.yaml`.

species_id:       "gariepinus"
label:            "C. gariepinus"
scientific_name:  "Clarias gariepinus"
ncbi_taxid:       13013

cohort:
  cohort_id:    "main_226_hatchery"
  n_samples:    226
  samples_file: "cohort/samples.ind"
  description:  "Pure C. gariepinus hatchery cohort. Mixed populations from
                Thai hatchery broodlines; substructure not yet resolved.
                Sequenced 9x; BAMs at bams root."

populations:
  # Initial placeholder: all 226 samples treated as one population.
  # When NGSadmix / family analysis resolves substructure, append new
  # population entries below this one — never overwrite. Old results
  # against population_id 'mixed' stay valid for reproducibility.
  - population_id: "mixed"
    label:          "all 226 samples (population structure unresolved)"
    members:        "ALL"
    status:         "active"
    source_methods: ["placeholder"]
    created_at:     "2026-02-04T00:00:00Z"
    notes:          "Initial state. Hatchery broodlines mixed. Population
                     structure to be resolved by NGSadmix K=8 + pedigree."

reference:
  fasta:                "fClaHyb_Gar_LG.fa"
  fai:                  "fClaHyb_Gar_LG.fa.fai"
  n_chromosomes:        28
  chrom_naming_pattern: "C_gar_LG{NN}"


