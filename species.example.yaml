# =============================================================================
# Notes on multi-species patterns the atlas supports
# =============================================================================
#
# 1. **Species-scoped read-only data roots.**
#    Master config declares roots like `precomp_gariepinus` and
#    `precomp_macrocephalus` separately. Layer entries that are species-scoped
#    template `{species_id}` and the registry routes to the right root.
#
# 2. **Shared comparative roots.**
#    Cross-species data (synteny, breakpoint reuse, phylogeny) lives at a
#    species-agnostic root like `comparative` and references both species
#    by ID inside the data itself.
#
# 3. **Flat candidates root with species_id field on each record.**
#    Candidates from any species share `data/candidates/`. Each candidate's
#    `lineage.json` records its species_id. A future mapping-table pass can
#    aggregate "all candidates from species X" or "all candidates with
#    cross-species support" without touching the filesystem layout.
#
# 4. **Population substructure as append-only.**
#    When NGSadmix or pedigree analysis resolves the hatchery into K
#    populations, append new population entries; do NOT overwrite the
#    initial 'mixed'. Old results stay readable.
#
# 5. **What's NOT planned (avoid the rabbit hole):**
#    - No cross-species sample harmonization (mixed-species cohorts).
#      If you need that, design when the situation actually arises.
#    - No automatic species inference from data files.
#      Species ID is declared in the config; data files trust the declaration.
#    - No species hierarchy / phylogeny inside the registry.
#      That belongs in domain layers (e.g. `phylo_tree`), not in the
#      species config.
